name: Spec & Test Plan Check
on:
  pull_request:

jobs:
  spec-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run spec artifact check
        run: python scripts/verify_spec_changes.py "origin/${{ github.base_ref }}"
      - name: Validate PR traceability fields
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/verify_pr_traceability.py
