name: Deploy Backend App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: read

jobs:
  deploy-backend-appservice:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve backend image
        run: |
          if [ -n "${{ secrets.BACKEND_IMAGE_NAME }}" ]; then
            echo "BACKEND_IMAGE_NAME=${{ secrets.BACKEND_IMAGE_NAME }}" >> $GITHUB_ENV
          else
            echo "BACKEND_IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/admin-portal-backend" >> $GITHUB_ENV
          fi
          echo "BACKEND_IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV

      - name: Configure App Service container
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config container set \
              --name "${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_BACKEND_RESOURCE_GROUP }}" \
              --container-image-name "$BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG" \
              --container-registry-url "${{ secrets.CONTAINER_REGISTRY_URL }}" \
              --container-registry-user "${{ secrets.CONTAINER_REGISTRY_USERNAME }}" \
              --container-registry-password "${{ secrets.CONTAINER_REGISTRY_PASSWORD }}"

      - name: Restart App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --name "${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}" \
              --resource-group "${{ secrets.AZURE_BACKEND_RESOURCE_GROUP }}"

      - name: Post-deployment health check
        env:
          HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "BACKEND_HEALTHCHECK_URL not configured; skipping smoke check."
            exit 0
          fi
          curl --fail --silent --show-error "$HEALTHCHECK_URL"
