---
name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Repository checks
        run: python scripts/repo_checks.py

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run repository tests
        run: python -m unittest discover -s tests/repo -p "test_*.py"
      - name: Backend Python syntax smoke check
        run: python -m compileall backend

  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Install test tools
        run: pip install pytest pytest-cov junit-xml
      - name: Run backend tests (pytest -> JUnit + coverage)
        run: |
          mkdir -p reports
          pytest tests/backend --junitxml=reports/junit.xml --cov=backend --cov-report=xml:reports/coverage.xml
      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: reports/**, reports/coverage.xml
      - name: Backend compileall
        run: python -m compileall backend tests/backend
      # NOTE: PR summary step removed due to reporter input error; re-add with a compatible reporter or a github-script summary

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests (Vitest -> JUnit + coverage)
        run: |
          mkdir -p reports
          # write junit.xml to reports/ via vitest-junit (installed by npm ci)
          npm run test:ci
      - name: Build frontend
        run: npm run build
      - name: Upload frontend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-reports
          path: reports/**, coverage/**
      # NOTE: PR summary step removed due to reporter input error; re-add with a compatible reporter or a github-script summary

  backend-asgi-image:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/admin-portal-backend" >> $GITHUB_ENV
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend ASGI container image
        run: docker build -f backend/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:ci .
      - name: Push backend ASGI container image
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest
  report:
    runs-on: ubuntu-latest
    needs: [backend-tests, build]
    steps:
      - uses: actions/checkout@v4
      - name: Download backend reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: backend-reports
        continue-on-error: true
      - name: Download frontend reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: frontend-reports
        continue-on-error: true
      - name: Merge coverage and upload to Codecov (placeholder)
        run: |
          echo "Merge coverage reports here if desired (coverage combine / lcov-result-merger)"
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend-reports/reports/coverage.xml, frontend-reports/coverage/lcov.info
